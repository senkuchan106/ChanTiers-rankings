<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChanTiers</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <div class="logo">
        <img src="assets/logo/chantiersicon.png" alt="ChanTiers Logo">
        <h1>ChanTiers</h1>
    </div>

    <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="testing.html">Testing</a>
        <a href="https://discord.gg/hAF2vDGUMb" target="_blank" class="discord-btn">Discord</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-title">
        <img src="assets/logo/chantiersicon.png" alt="ChanTiers Large Logo">
        <div class="hero-text">
            <h2>ChanTiers</h2>
            <p>Manually tested Minecraft PvP rankings. We also support cracked rankings.</p>
        </div>
    </div>

    <div class="modes">
        <button class="mode active" data-mode="overall">
            <img src="assets/icons/overall.svg" alt="Overall"> Overall
        </button>
        <button class="mode" data-mode="sword">
            <img src="assets/icons/sword.svg" alt="Sword"> Sword
        </button>
        <button class="mode" data-mode="nethpot">
            <img src="assets/icons/nethpot.svg" alt="NethPot"> NethPot
        </button>
        <button class="mode" data-mode="diapot">
            <img src="assets/icons/diapot.svg" alt="DiaPot"> DiaPot
        </button>
        <button class="mode" data-mode="vanilla">
            <img src="assets/icons/vanilla.svg" alt="Vanilla"> Vanilla
        </button>
    </div>

    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search username">
        <button onclick="searchPlayer()">Search</button>
    </div>
</section>

<section class="leaderboard">
    <div class="lb-header">
        <span>#</span>
        <span>PLAYER</span>
        <span>REGION</span>
        <span>BEST TIERS</span>
    </div>
    <div id="players"></div>
</section>

<section id="adminPanel" style="display:none; margin:40px;">
    <h2>Admin Panel</h2>

    <input id="name" placeholder="Name"><br><br>
    <input id="region" placeholder="Region"><br><br>

    <input id="sword" placeholder="Sword Tier"><br><br>
    <input id="nethpot" placeholder="NethPot Tier"><br><br>
    <input id="diapot" placeholder="DiaPot Tier"><br><br>
    <input id="vanilla" placeholder="Vanilla Tier"><br><br>

    <button onclick="addPlayer()">Add Player</button>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLY9hZHaRxw2uThNcwW8b5r-oOhqAnGpk",
        authDomain: "chantiers-ranking.firebaseapp.com",
        projectId: "chantiers-ranking",
        storageBucket: "chantiers-ranking.firebasestorage.app",
        messagingSenderId: "1097374125731",
        appId: "1:1097374125731:web:16e4893346cf94a513f916",
        measurementId: "G-2GQLPHV003"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.fb = { collection, addDoc, getDocs, deleteDoc, doc, updateDoc };
</script>

<script src="script.js"></script>
</body>
</html>
